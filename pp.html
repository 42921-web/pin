<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier Dashboard</title>
    <!-- นำเข้า Google Fonts (Inter & Sarabun) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --accent-glow: #6366f1;
            --accent-success: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .header-section {
            margin-bottom: 28px;
        }

        .brand-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ปุ่มเริ่มทำงาน */
        .btn-action {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
            background: linear-gradient(135deg, #4338ca 0%, #4f46e5 100%);
        }

        .btn-action:disabled {
            background: #334155;
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ส่วนจัดวางกล้องและตัวจับเวลา */
        .preview-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 24px auto;
            display: none; /* ซ่อนไว้รอจนกว่าจะกดเริ่ม */
        }

        #webcam-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            transform: scaleX(-1); /* ส่องกระจกแบบธรรมชาติ */
        }

        /* วงแหวนสถานะเวลานับถอยหลัง 3 วินาที */
        .pulse-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 2px solid var(--accent-glow);
            border-radius: 50%;
            animation: pulse-animation 3s infinite linear;
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.98); opacity: 0.8; border-color: var(--accent-glow); }
            90% { border-color: var(--accent-success); }
            100% { transform: scale(1.03); opacity: 0; }
        }

        .status-badge {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 12px;
            color: #38bdf8;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-success);
        }

        /* ส่วนแสดงแถบผลลัพธ์คลาส */
        #label-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: left;
        }

        .result-item {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .result-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .class-label {
            font-weight: 600;
            color: #e2e8f0;
        }

        .class-percent {
            font-family: monospace;
            font-weight: 700;
            color: #38bdf8;
        }

        .progress-track {
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4f46e5, #06b6d4);
            border-radius: 999px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div class="dashboard-card">
    <div class="header-section">
        <span class="brand-badge">Teachable Machine AI</span>
        <h1>ระบบวิเคราะห์รูปภาพอัจฉริยะ</h1>
        <p class="subtitle">ประมวลผลสแกนวัตถุอัตโนมัติรอบละ 3 วินาที</p>
    </div>

    <!-- ปุ่มเปิดระบบ -->
    <button type="button" class="btn-action" id="start-btn" onclick="init()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"></path></svg>
        เริ่มต้นเปิดใช้งานกล้อง
    </button>

    <!-- บล็อกแสดงผลกล้อง (จะเปิดขึ้นเมื่อกด Start) -->
    <div class="preview-wrapper" id="preview-wrapper">
        <div class="pulse-ring"></div>
        <div id="webcam-container"></div>
    </div>

    <div id="status-area" style="display: none; text-align: center;">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="status-text">กำลังบันทึกภาพและวิเคราะห์ผล...</span>
        </div>
    </div>

    <!-- บล็อกแสดงรายการผลลัพธ์ -->
    <div id="label-container"></div>
</div>

<!-- โหลดไลบรารีที่จำเป็น -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/J6ZfMqB8G7/";
    let model, webcam, labelContainer, maxPredictions;
    let analysisInterval; // ตัวแปรคุมรอบเวลา 3 วินาที

    async function init() {
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerText = "กำลังติดตั้งโมเดล AI...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        try {
            // 1. โหลด AI Model
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 2. ตั้งค่าตั้งต้นเว็บแคม
            const flip = true; 
            webcam = new tmImage.Webcam(220, 220, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            // 3. รันตัว Animation Loop เพื่อให้ภาพสตรีมสดยังคงแสดงผลเคลื่อนไหวต่อเนื่องสมจริง
            window.requestAnimationFrame(loop);

            // 4. จัดการอินเตอร์เฟสอัปเดตหน้าจอ
            startBtn.style.display = "none";
            document.getElementById("preview-wrapper").style.display = "block";
            document.getElementById("status-area").style.display = "block";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 

            // สร้าง UI แถบความคืบหน้า (Progress Bars) รอไว้ล่วงหน้า
            for (let i = 0; i < maxPredictions; i++) {
                const item = document.createElement("div");
                item.className = "result-item";
                item.innerHTML = `
                    <div class="result-info">
                        <span class="class-label">รอวิเคราะห์...</span>
                        <span class="class-percent">0.0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill"></div>
                    </div>
                `;
                labelContainer.appendChild(item);
            }

            // 5. ประมวลผลรอบแรกทันที และ ตั้งค่าตัดเวลาส่งวิเคราะห์ทุกๆ 3 วินาที (3000ms)
            await predict();
            analysisInterval = setInterval(predict, 3000);

        } catch (error) {
            console.error(error);
            alert("ไม่สามารถเข้าถึงกล้องถ่ายภาพ หรือเชื่อมต่อ AI Server ผิดพลาด");
            startBtn.disabled = false;
            startBtn.innerText = "เริ่มต้นเปิดใช้งานกล้อง";
        }
    }

    // ฟังก์ชันการอัปเดตเฟรมเรตกล้องตามรอบฮาร์ดแวร์ปกติ (เพื่อให้ภาพสตรีมสดไม่กระตุก)
    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    // ฟังก์ชันสั่ง AI สแกนภาพและแสดงผลลัพธ์ (ถูกเรียกทำงานแบบเป็นรอบ ทุกๆ 3 วินาที)
    async function predict() {
        if (!model || !webcam) return;
        
        // AI สแกนรูปจากเฟรมล่าสุด ณ วินาทีนั้นบน canvas 
        const prediction = await model.predict(webcam.canvas);
        const items = labelContainer.getElementsByClassName("result-item");

        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = prediction[i].probability;
            const percentageText = (probability * 100).toFixed(1) + "%";

            // เรนเดอร์ข้อความและปรับแถบขยายแบบอนิเมชันให้สอดคล้องความแม่นยำ
            items[i].querySelector(".class-label").innerText = className;
            items[i].querySelector(".class-percent").innerText = percentageText;
            items[i].querySelector(".progress-fill").style.width = percentageText;
            
            // เพิ่มเอฟเฟกต์สีเด่นชัดในแถบวิเคราะห์ที่มีโอกาสสูงสุด (เกิน 70%)
            if(probability > 0.70) {
                items[i].querySelector(".progress-fill").style.background = "linear-gradient(90deg, #10b981, #34d399)";
            } else {
                items[i].querySelector(".progress-fill").style.background = "linear-gradient(90deg, #4f46e5, #06b6d4)";
            }
        }
    }
</script>
</body>
</html>
